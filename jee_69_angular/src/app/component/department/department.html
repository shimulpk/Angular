<div class="container mt-4">

  <h3>Department Management</h3>

  <!-- 🔹 FORM (CREATE / UPDATE) -->
  <form (ngSubmit)="saveDepartment()" #depForm="ngForm" class="mb-4">

    <div class="row">
      <div class="col-md-4">
        <input
          type="text"
          class="form-control"
          placeholder="Enter Name"
          [(ngModel)]="department.name"
          name="name"
          required>
      </div>

      <div class="col-md-4">
        <input
          type="email"
          class="form-control"
          placeholder="Enter Email"
          [(ngModel)]="department.email"
          name="email"
          required>
      </div>

      <div class="col-md-4">
        <button class="btn btn-success w-100" type="submit">
          {{ isEdit ? 'Update Department' : 'Add Department' }}
        </button>
      </div>
    </div>

    <div class="mt-2">
      <button type="button" class="btn btn-secondary" (click)="resetForm()">
        Reset
      </button>
    </div>

  </form>

  <!-- 🔹 TABLE -->
  <table class="table table-striped table-bordered mt-3">

    <thead class="table-dark text-center">
      <tr>
        <th>SL</th>
        <th>Name</th>
        <th>Email</th>
        <th width="200">Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let d of departments; let i = index">

        <td>{{ i + 1 }}</td>
        <td>{{ d.name }}</td>
        <td>{{ d.email }}</td>

        <td class="text-center">

          <!-- EDIT -->
          <button
            class="btn btn-warning btn-sm me-2"
            (click)="editDepartment(d)">
            Edit
          </button>

          <!-- DELETE -->
          <button
            class="btn btn-danger btn-sm"
            (click)="deleteDepartment(d.id!)">
            Delete
          </button>

        </td>

      </tr>
    </tbody>

  </table>

</div>

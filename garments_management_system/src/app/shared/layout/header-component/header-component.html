<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

      <span class="navbar-toggler-icon"></span>

    </button>

    <!-- MENU -->

      class="collapse navbar-collapse"
      id="navbarSupportedContent">

      <!-- LEFT MENU -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <!-- HOME -->
        <li class="nav-item">

          <a
            class="nav-link"
            routerLink="/home">

            Home

          </a>

        </li>

        <!-- BUYERS -->
        <li
          class="nav-item"
          *ngIf="
            hasRole([
              'Admin',
              'Marchandiser'
            ])
          ">

          <a
            class="nav-link"
            routerLink="/buyers">

            Buyers

          </a>

        </li>

        <!-- STYLES -->
        <li
          class="nav-item"
          *ngIf="
            hasRole([
              'Admin',
              'Marchandiser'
            ])
          ">

          <a
            class="nav-link"
            routerLink="/styles">

          </a>

        </li>

        <!-- ORDERS -->
        <li
          class="nav-item"
          *ngIf="
            hasRole([
              'Admin',
              'Marchandiser'
            ])
          ">

          <a
            class="nav-link"
            routerLink="/orders">

          </a>

        </li>

        <!-- BOMS -->
        <li
          class="nav-item"

            hasRole([

            ])
          ">

            routerLink="/boms">

          </a>

            ])

        </li>

          <span class="text-white me-3">

          </span>

          <!-- ROLE -->
          <span class="badge bg-primary me-3">

            {{ loggedUser?.role }}

          </span>

          <!-- LOGOUT -->
          <button
            class="btn btn-danger btn-sm"
            (click)="logout()">

            Logout

          </button>

        </ng-container>

        <!-- IF USER NOT LOGGED IN -->
        <ng-container *ngIf="!loggedUser">
